    <path d="M0,620 L1200,620"/>
    <path d="M0,640 L1200,640"/>
    <path d="M0,655 L1200,655"/>
  </g>

  <rect width="1200" height="675" filter="url(#grain)" opacity="0.35"/>
  <rect width="1200" height="675" fill="url(#sky)" opacity="0.08" style="mix-blend-mode:multiply"/>
  
  <rect x="0" y="0" width="1200" height="4" fill="#4a3c2c" opacity="0.4"/>
  <rect x="0" y="671" width="1200" height="4" fill="#4a3c2c" opacity="0.4"/>
  <rect x="0" y="0" width="4" height="675" fill="#4a3c2c" opacity="0.4"/>
  <rect x="1196" y="0" width="4" height="675" fill="#4a3c2c" opacity="0.4"/>
