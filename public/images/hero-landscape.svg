    <path d="M700,510 Q750,490 800,515 Q850,535 870,520 L870,535 L700,535 Z"/>
  </g>

  <g stroke="#6b5a3c" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M100,580 Q300,550 500,570 Q700,590 900,560 Q1050,545 1200,570" stroke-dasharray="6,4"/>
  </g>

  <g fill="#4a3c2c" opacity="0.7">
    <ellipse cx="180" cy="595" rx="40" ry="18"/>
    <ellipse cx="230" cy="600" rx="35" ry="15"/>
    <ellipse cx="820" cy="590" rx="50" ry="22"/>
    <ellipse cx="900" cy="600" rx="30" ry="14"/>
  </g>

  <g fill="#8b7355" opacity="0.6">
