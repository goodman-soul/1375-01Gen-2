  <path d="M0,480 L180,410 L320,450 L480,390 L620,440 L780,395 L920,450 L1080,410 L1200,460 L1200,675 L0,675 Z" fill="url(#nearMt)"/>
  
  <path d="M480,390 L460,350 L520,340 L560,360 L620,345 L620,440 L480,440 Z" fill="url(#snow)" opacity="0.7"/>

  <path d="M0,540 L200,500 L400,530 L600,495 L800,520 L1000,490 L1200,530 L1200,675 L0,675 Z" fill="url(#valley)" opacity="0.85"/>

  <g fill="#5a4a30" opacity="0.6">
