<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.35
        0 0 0 0 0.22
        0 0 0 0 0.08
        0 0 0 0.22 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b9d0e0"/>
      <stop offset="100%" stop-color="#d8d0b8"/>
    </linearGradient>
    <linearGradient id="mtFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9aa8"/>
      <stop offset="100%" stop-color="#a0a890"/>
    </linearGradient>
    <linearGradient id="mtSnow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ece4d4"/>
      <stop offset="30%" stop-color="#d0c8b8"/>
      <stop offset="100%" stop-color="#7a8268"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90a060"/>
      <stop offset="50%" stop-color="#7a8a4a"/>
      <stop offset="100%" stop-color="#5a6a30"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>

  <circle cx="650" cy="100" r="50" fill="#f0e6cf" opacity="0.45"/>

  <path d="M0,300 L150,240 L320,280 L480,220 L640,270 L800,240 L800,380 L0,380 Z" fill="url(#mtFar)" opacity="0.5"/>

  <path d="M0,380 L180,250 L350,320 L520,240 L680,310 L800,280 L800,430 L0,430 Z" fill="url(#mtSnow)"/>
  <path d="M180,250 L160,310 L210,285 Z" fill="#f0e8d8" opacity="0.85"/>
  <path d="M520,240 L500,300 L555,275 Z" fill="#f0e8d8" opacity="0.8"/>
  <path d="M350,320 L335,360 L375,345 Z" fill="#f0e8d8" opacity="0.5"/>

  <rect y="420" width="800" height="180" fill="url(#grass)"/>

  <g fill="#6a7a38" opacity="0.4">
    <path d="M0,460 Q150,445 300,455 Q450,465 600,458 Q720,452 800,462 L800,475 Q700,465 550,472 Q400,480 250,472 Q120,466 0,478 Z"/>
    <path d="M0,500 Q200,485 400,495 Q600,505 800,495 L800,515 Q600,505 400,515 Q200,525 0,515 Z" opacity="0.7"/>
  </g>

  <g fill="#8b7355" opacity="0.85">
