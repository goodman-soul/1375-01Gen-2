<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.35
        0 0 0 0 0.22
        0 0 0 0 0.08
        0 0 0 0.2 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a07a"/>
      <stop offset="100%" stop-color="#c9b896"/>
    </linearGradient>
    <linearGradient id="cliff" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a2d20"/>
      <stop offset="50%" stop-color="#5a4a32"/>
      <stop offset="100%" stop-color="#3a2d20"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b7a5a"/>
      <stop offset="50%" stop-color="#5a6a45"/>
      <stop offset="100%" stop-color="#4a5a35"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5540"/>
      <stop offset="100%" stop-color="#4a3c2c"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>

  <path d="M0,250 L180,200 L320,260 L480,190 L640,250 L800,210 L800,350 L0,350 Z" fill="#6b5a40" opacity="0.55"/>

  <path d="M0,350 L0,500 L280,420 L360,460 L440,420 L560,460 L680,410 L800,450 L800,350 Z" fill="url(#cliff)"/>

  <rect x="0" y="460" width="800" height="140" fill="url(#water)"/>

  <g fill="#7a8a5a" opacity="0.3">
    <path d="M0,500 Q100,490 200,498 Q300,505 400,500 Q500,495 600,502 Q700,508 800,500 L800,520 Q700,528 600,522 Q500,517 400,520 Q300,525 200,520 Q100,515 0,522 Z"/>
    <path d="M0,540 Q150,530 300,538 Q450,545 600,540 Q700,535 800,542 L800,560 Q700,568 600,562 Q450,557 300,560 Q150,565 0,562 Z" opacity="0.5"/>
  </g>

  <g fill="#5a6a3a" opacity="0.4">
    <path d="M0,580 Q200,570 400,575 Q600,580 800,575 L800,600 L0,600 Z"/>
  </g>

  <g stroke="#4a5a2a" stroke-width="1" fill="none" opacity="0.3">
    <path d="M0,505 Q200,495 400,500 Q600,505 800,500" stroke-dasharray="3,8"/>
    <path d="M0,550 Q200,540 400,545 Q600,550 800,545" stroke-dasharray="2,6"/>
  </g>

  <g>
    <path d="M180,380 Q400,340 620,380" fill="none" stroke="url(#bridge)" stroke-width="5"/>
    <path d="M180,395 Q400,355 620,395" fill="none" stroke="#5a4a30" stroke-width="2" stroke-dasharray="6,8"/>

    <g stroke="#3a2d20" stroke-width="2" opacity="0.9">
      <line x1="220" y1="380" x2="200" y2="470"/>
      <line x1="300" y1="363" x2="290" y2="490"/>
      <line x1="400" y1="352" x2="400" y2="500"/>
      <line x1="500" y1="363" x2="510" y2="490"/>
      <line x1="580" y1="380" x2="600" y2="470"/>
    </g>

    <g stroke="#5a4a30" stroke-width="1" opacity="0.6">
      <line x1="180" y1="385" x2="200" y2="470"/>
      <line x1="250" y1="369" x2="255" y2="485"/>
      <line x1="350" y1="355" x2="355" y2="495"/>
      <line x1="450" y1="355" x2="445" y2="495"/>
      <line x1="550" y1="369" x2="545" y2="485"/>
      <line x1="620" y1="385" x2="600" y2="470"/>
    </g>
  </g>

  <g fill="#3a2d20" opacity="0.85">
    <g transform="translate(320, 360)">
      <ellipse cx="0" cy="28" rx="12" ry="4.5"/>
      <rect x="-6" y="0" width="12" height="28" rx="3"/>
      <circle cx="0" cy="-5" r="8"/>
    </g>
    <g transform="translate(420, 358)">
      <ellipse cx="0" cy="29" rx="13" ry="4.5"/>
      <rect x="-6.5" y="-2" width="13" height="31" rx="3"/>
      <circle cx="0" cy="-8" r="8.5"/>
    </g>
  </g>

  <g fill="#6b5540" opacity="0.6">
    <rect x="120" y="355" width="80" height="60"/>
    <polygon points="110,355 160,320 210,355" fill="#5a4a32"/>
    <rect x="140" y="380" width="25" height="35" fill="#3a2d20"/>
    
    <rect x="620" y="370" width="90" height="65"/>
    <polygon points="610,370 665,335 720,370" fill="#5a4a32"/>
    <rect x="645" y="395" width="28" height="40" fill="#3a2d20"/>
  </g>

  <g fill="#8b7355" opacity="0.3">
    <path d="M0,360 Q120,370 180,380" stroke-dasharray="4,6"/>
    <path d="M620,385 Q700,400 800,410" stroke-dasharray="4,6"/>
  </g>

  <rect width="800" height="600" filter="url(#grain)" opacity="0.4"/>
  <rect width="800" height="600" fill="#5a4a30" opacity="0.1" style="mix-blend-mode:multiply"/>

  <rect x="0" y="0" width="800" height="3" fill="#4a3c2c" opacity="0.5"/>
  <rect x="0" y="597" width="800" height="3" fill="#4a3c2c" opacity="0.5"/>
</svg>
