<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.35
        0 0 0 0 0.22
        0 0 0 0 0.08
        0 0 0 0.22 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9b896"/>
      <stop offset="100%" stop-color="#e0d4b8"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4a32"/>
      <stop offset="100%" stop-color="#8b7355"/>
    </linearGradient>
    <linearGradient id="slope" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5a40"/>
      <stop offset="100%" stop-color="#4a3c2c"/>
    </linearGradient>
    <linearGradient id="rooftile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3c2c"/>
      <stop offset="100%" stop-color="#2E1F15"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a08868"/>
      <stop offset="100%" stop-color="#7a6a4a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>

  <path d="M0,320 L180,200 L360,280 L540,190 L720,270 L800,240 L800,420 L0,420 Z" fill="url(#mtn)" opacity="0.6"/>

  <path d="M0,400 Q200,350 400,380 Q600,410 800,370 L800,600 L0,600 Z" fill="url(#slope)"/>

  <path d="M100,580 Q300,550 500,565 Q700,580 800,560" fill="none" stroke="#3a2d20" stroke-width="6" opacity="0.4"/>
  <path d="M80,590 Q300,560 520,580 Q700,595 800,575" fill="none" stroke="#4a3c2c" stroke-width="3" opacity="0.3" stroke-dasharray="8,6"/>

  <g fill="url(#wall)">
    <rect x="120" y="390" width="100" height="160"/>
    <rect x="240" y="360" width="120" height="190"/>
    <rect x="380" y="410" width="90" height="140"/>
    <rect x="490" y="370" width="110" height="180"/>
    <rect x="620" y="400" width="100" height="150"/>
  </g>

  <g fill="url(#rooftile)">
    <polygon points="105,390 170,340 235,390"/>
    <polygon points="225,360 300,305 375,360"/>
    <polygon points="365,410 425,365 485,410"/>
    <polygon points="475,370 545,315 615,370"/>
    <polygon points="605,400 670,350 735,400"/>
  </g>

  <g fill="#3a2d20" opacity="0.8">
    <rect x="150" y="480" width="28" height="70"/>
    <rect x="280" y="460" width="35" height="90"/>
    <rect x="400" y="490" width="25" height="60"/>
    <rect x="520" y="470" width="32" height="80"/>
    <rect x="650" y="485" width="30" height="65"/>
  </g>

  <g fill="#e8d9b8" opacity="0.6">
    <rect x="140" y="420" width="18" height="25"/>
    <rect x="180" y="420" width="18" height="25"/>
    <rect x="258" y="395" width="22" height="30"/>
    <rect x="310" y="395" width="22" height="30"/>
    <rect x="500" y="405" width="20" height="28"/>
    <rect x="560" y="405" width="20" height="28"/>
    <rect x="635" y="430" width="20" height="26"/>
    <rect x="685" y="430" width="20" height="26"/>
  </g>

  <g stroke="#5a4a30" stroke-width="2" opacity="0.5">
    <line x1="120" y1="450" x2="220" y2="450"/>
    <line x1="240" y1="430" x2="360" y2="430"/>
    <line x1="490" y1="440" x2="600" y2="440"/>
  </g>

  <g fill="#4a3c2c" opacity="0.7">
    <polygon points="40,520 80,490 90,510 60,540 35,535"/>
    <polygon points="720,505 760,485 775,510 740,535 710,525"/>
  </g>

  <g fill="#6b5540" opacity="0.6">
    <rect x="300" y="550" width="3" height="30"/>
    <rect x="330" y="545" width="3" height="35"/>
    <rect x="480" y="555" width="3" height="25"/>
    <rect x="550" y="548" width="3" height="32"/>
  </g>

  <g fill="#3a2d20" opacity="0.8">
    <g transform="translate(350, 510)">
      <ellipse cx="0" cy="58" rx="14" ry="5"/>
      <rect x="-7" y="10" width="14" height="48" rx="4"/>
      <circle cx="0" cy="3" r="9"/>
    </g>
    <g transform="translate(500, 520)">
      <ellipse cx="0" cy="50" rx="12" ry="4"/>
      <rect x="-6" y="12" width="12" height="38" rx="3"/>
      <circle cx="0" cy="6" r="8"/>
    </g>
  </g>

  <rect width="800" height="600" filter="url(#grain)" opacity="0.35"/>
  <rect width="800" height="600" fill="#8B5A2B" opacity="0.08" style="mix-blend-mode:multiply"/>

  <rect x="0" y="0" width="800" height="3" fill="#4a3c2c" opacity="0.5"/>
  <rect x="0" y="597" width="800" height="3" fill="#4a3c2c" opacity="0.5"/>
</svg>
